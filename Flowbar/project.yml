name: Flowbar
options:
  bundleIdPrefix: com.flowbar
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "15.0"

targets:
  Flowbar:
    type: application
    platform: macOS
    sources:
      - Sources
    resources:
      - Resources
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Resources/Flowbar.entitlements
        PRODUCT_BUNDLE_IDENTIFIER: com.flowbar.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: NO
    entitlements:
      path: Resources/Flowbar.entitlements
      properties:
        com.apple.security.app-sandbox: false

  FlowbarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - Tests
    dependencies:
      - target: Flowbar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flowbar.tests
        GENERATE_INFOPLIST_FILE: YES

  FlowbarUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - UITests
    dependencies:
      - target: Flowbar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flowbar.uitests
        GENERATE_INFOPLIST_FILE: YES
