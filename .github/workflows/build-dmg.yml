name: Build DMG
run-name: Build DMG v${{ inputs.version }}

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: Flowbar
        run: xcodegen generate

      - name: Archive app
        run: |
          xcodebuild archive \
            -project Flowbar/Flowbar.xcodeproj \
            -scheme Flowbar \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            -archivePath "$GITHUB_WORKSPACE/build/Flowbar.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: Extract .app from archive
        run: |
          cp -r \
            "$GITHUB_WORKSPACE/build/Flowbar.xcarchive/Products/Applications/Flowbar.app" \
            "$GITHUB_WORKSPACE/build/Flowbar.app"

      - name: Create DMG
        run: |
          hdiutil create \
            -volname Flowbar \
            -srcfolder "$GITHUB_WORKSPACE/build/Flowbar.app" \
            -ov \
            -format UDZO \
            "$GITHUB_WORKSPACE/build/Flowbar.dmg"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: Flowbar-${{ github.sha }}
          path: build/Flowbar.dmg
          retention-days: 30

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            echo "Previous release: $PREV_TAG"
            RANGE_LABEL="Changes since $PREV_TAG"
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG"..HEAD)
          else
            echo "No previous release tag found"
            RANGE_LABEL="Recent changes"
            COMMITS=$(git log --pretty=format:"- %s (%h)" -20)
          fi
          {
            echo "## Flowbar v${{ inputs.version }}"
            echo ""
            echo "### $RANGE_LABEL"
            echo "$COMMITS"
            echo ""
            echo "### Installation"
            echo "1. Download \`Flowbar.dmg\` below"
            echo "2. Open the DMG and drag Flowbar to your Applications folder"
            echo "3. Launch Flowbar — macOS will show a security warning since the app isn't notarized"
            echo "4. Go to **System Settings → Privacy & Security**, scroll down, and click **Open Anyway**"
            echo ""
            echo "Built from commit ${{ github.sha }}."
          } > /tmp/release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Flowbar v${{ inputs.version }}
          body_path: /tmp/release-body.md
          files: build/Flowbar.dmg
          draft: false
          prerelease: false
